<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Validar y Registrar Documentos en Blockchain</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #eef3ff;
      text-align: center;
      color: #222;
      margin: 0;
      padding: 0;
    }
    header {
      background: #1a237e;
      color: white;
      padding: 20px;
    }
    h1 { margin: 0; font-size: 24px; }
    .container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 40px;
      gap: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding: 24px;
      width: 360px;
    }
    button {
      background: #2962ff;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 12px;
      font-weight: bold;
    }
    button:hover { background: #0039cb; }
    p { font-size: 14px; word-wrap: break-word; }
    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>

  <header>
    <h1>🔐 Validar y Registrar Documentos en Blockchain</h1>
    <p>Red Sepolia - Contrato: <b>0xd2C97c29E149Dc1b1DE22Ccd248b9Fe4e7Bf9CBe</b></p>
  </header>

  <div class="container">

    <!-- 1️⃣ MetaMask -->
    <div class="card">
      <h3>🦊 Conectar MetaMask</h3>
      <button id="connectButton">Conectar</button>
      <p id="account"></p>
      <p id="network"></p>
    </div>

    <!-- 2️⃣ Subir archivo -->
    <div class="card">
      <h3>📄 Subir Documento</h3>
      <input type="file" id="fileInput"><br>
      <button id="hashButton">Calcular Hash</button>
      <p id="fileHash"></p>
    </div>

    <!-- 3️⃣ Acciones -->
    <div class="card">
      <h3>⚙️ Acciones Blockchain</h3>
      <button id="verifyButton">Verificar Documento</button>
      <button id="registerButton">Registrar Documento</button>
      <p id="status"></p>
    </div>

  </div>

  <script>
    const contractAddress = "0xd2C97c29E149Dc1b1DE22Ccd248b9Fe4e7Bf9CBe";
    const contractABI = [
      "function certifyDocument(bytes32 docHash) public",
      "function verifyDocument(bytes32 docHash) public view returns (address certifier, uint256 timestamp, bool exists)"
    ];

    let provider, signer, contract, currentHash;

    // ===== Config Sepolia =====
    // Sepolia chainId: 11155111 (0xaa36a7 en HEX) [2](https://docs.metamask.io/metamask-connect/evm/guides/manage-networks/)[3](https://ethereum.stackexchange.com/questions/134674/how-to-change-or-prompt-to-change-a-users-current-metamask-network-programmat)
    const SEPOLIA_CHAIN_ID_DEC = 11155111;
    const SEPOLIA_CHAIN_ID_HEX = "0xaa36a7";

    // ✅ Fuerza Sepolia: intenta cambiar; si no existe, la agrega y vuelve a intentar
    // wallet_switchEthereumChain y wallet_addEthereumChain están estandarizados para wallets [1](https://eips.ethereum.org/EIPS/eip-3326)[2](https://docs.metamask.io/metamask-connect/evm/guides/manage-networks/)
    async function ensureSepolia() {
      if (!window.ethereum) throw new Error("MetaMask no detectado");

      try {
        await window.ethereum.request({
          method: "wallet_switchEthereumChain",
          params: [{ chainId: SEPOLIA_CHAIN_ID_HEX }],
        });
        return true;
      } catch (err) {
        // 4902: la red no está agregada
        if (err && err.code === 4902) {
          // Importante: usar symbol "ETH" (corto) para evitar validaciones/bugs con símbolos largos [4](https://github.com/metamask/metamask-extension/issues/36905)
          await window.ethereum.request({
            method: "wallet_addEthereumChain",
            params: [{
              chainId: SEPOLIA_CHAIN_ID_HEX,
              chainName: "Sepolia Testnet",
              nativeCurrency: { name: "Ether", symbol: "ETH", decimals: 18 },
              rpcUrls: ["https://rpc.sepolia.org"],
              blockExplorerUrls: ["https://sepolia.etherscan.io"]
            }],
          });

          // luego de agregar, intenta el switch nuevamente
          await window.ethereum.request({
            method: "wallet_switchEthereumChain",
            params: [{ chainId: SEPOLIA_CHAIN_ID_HEX }],
          });
          return true;
        }

        // 4001: usuario rechazó
        if (err && err.code === 4001) {
          throw new Error("El usuario rechazó el cambio a Sepolia.");
        }

        throw err;
      }
    }

    // ✅ Recomendado: si cambian de red, refrescar para que ethers detecte correctamente
    // MetaMask recomienda manejar chainChanged para reflejar cambios de red [2](https://docs.metamask.io/metamask-connect/evm/guides/manage-networks/)
    if (window.ethereum) {
      window.ethereum.on("chainChanged", () => window.location.reload());
    }

    // 🦊 Conectar MetaMask (con auto-switch a Sepolia)
    document.getElementById("connectButton").onclick = async () => {
      if (!window.ethereum) return alert("Por favor, instala MetaMask.");

      try {
        document.getElementById("status").innerHTML = "⏳ Cambiando a Sepolia...";

        // 1) Forzar Sepolia ANTES de crear provider/signers
        await ensureSepolia();

        // 2) Conectar MetaMask con ethers Web3Provider (toma la red activa en la wallet) ethers.org/v4/api-providers.html)
        provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);

        signer = provider.getSigner();
        contract = new ethers.Contract(contractAddress, contractABI, signer);

        const account = await signer.getAddress();
        const network = await provider.getNetwork();

        document.getElementById("account").innerText = "Cuenta: " + account;
        document.getElementById("network").innerText = "Red: " + network.name + " (" + network.chainId + ")";

        // 3) Validación dura: debe ser Sepolia
        if (network.chainId !== SEPOLIA_CHAIN_ID_DEC) {
          document.getElementById("status").innerHTML =
            "🚫 Estás en la red incorrecta. Cambia a Sepolia (11155111).";
          return;
        }

        document.getElementById("status").innerHTML = "✅ MetaMask conectada correctamente en Sepolia.";
      } catch (err) {
        console.error(err);
        document.getElementById("status").innerHTML =
          "❌ Error al conectar/cambiar a Sepolia: " + (err.message || "ver consola");
      }
    };

    // 📄 Calcular hash SHA-256 del archivo
    document.getElementById("hashButton").onclick = async () => {
      const file = document.getElementById("fileInput").files[0];
      if (!file) return alert("Selecciona un archivo.");

      const buffer = await file.arrayBuffer();
      const hashBuffer = await crypto.subtle.digest("SHA-256", buffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      currentHash = "0x" + hashArray.map(b => b.toString(16).padStart(2, "0")).join("");

      document.getElementById("fileHash").innerText = "Hash: " + currentHash;
      document.getElementById("status").innerHTML = "✅ Hash generado correctamente.";
    };

    // 🔍 Verificar documento
    document.getElementById("verifyButton").onclick = async () => {
      if (!contract || !currentHash) return alert("Conecta MetaMask y calcula el hash primero.");
      try {
        const network = await provider.getNetwork();
        if (network.chainId !== SEPOLIA_CHAIN_ID_DEC) {
          document.getElementById("status").innerHTML = "🚫 Cambia a Sepolia para verificar.";
          return;
        }

        const result = await contract.verifyDocument(currentHash);
        const [certifier, timestamp, exists] = result;

        if (exists) {
          const date = new Date(timestamp * 1000).toLocaleString();
          document.getElementById("status").innerHTML =
            "✅ Documento registrado por " + certifier + " el " + date;
        } else {
          document.getElementById("status").innerHTML = "⚠️ El documento no está registrado.";
        }
      } catch (err) {
        console.error(err);
        document.getElementById("status").innerHTML = "❌ Error al verificar documento.";
      }
    };

    // 📝 Registrar documento
    document.getElementById("registerButton").onclick = async () => {
      if (!contract || !currentHash) return alert("Conecta MetaMask y calcula el hash primero.");

      try {
        const network = await provider.getNetwork();
        if (network.chainId !== SEPOLIA_CHAIN_ID_DEC) {
          document.getElementById("status").innerHTML = "🚫 Cambia a Sepolia para registrar.";
          return;
        }

        document.getElementById("status").innerHTML = "⏳ Enviando transacción...";
        const tx = await contract.certifyDocument(currentHash);
        await tx.wait();

        document.getElementById("status").innerHTML = "✅ Documento registrado exitosamente.";
      } catch (err) {
        console.error("Error al registrar:", err);

        // 4001: usuario rechazó en MetaMask
        if (err && err.code === 4001) {
          document.getElementById("status").innerHTML = "🚫 Transacción rechazada por el usuario.";
        } else if (err.error && err.error.message && err.error.message.includes("Solo el propietario")) {
          document.getElementById("status").innerHTML = "🚫 Solo el propietario puede registrar documentos.";
        } else if (err.message && err.message.includes("execution reverted")) {
          document.getElementById("status").innerHTML = "⚠️ El documento ya está registrado o no tienes permiso.";
        } else {
          document.getElementById("status").innerHTML = "❌ Error al registrar documento.";
        }
      }
    };
  </script>

</body>
</html>
